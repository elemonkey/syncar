name: Deploy SYNCAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy to Production Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          echo "🚀 Iniciando despliegue en producción..."
          DEPLOY_PATH=/www/wwwroot/syncar.cl
          sudo mkdir -p $DEPLOY_PATH
          cd $DEPLOY_PATH
          sudo rm -rf * .[!.]* 2>/dev/null || true
          git clone https://github.com/${{ github.repository }} .
          echo "Creando archivo .env..."
          cat > .env << ENVEOF
          COMPOSE_PROJECT_NAME=syncar
          POSTGRES_DB=syncar_db
          POSTGRES_USER=syncar_admin
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL=postgresql://syncar_admin:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/syncar_db
          REDIS_URL=redis://redis:6379/0
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          FRONTEND_URL=https://syncar.cl
          NODE_ENV=production
          ENV=production
          NEXT_PUBLIC_API_URL=/api/v1
          ENVEOF
          echo "Limpiando contenedores y servicios anteriores..."
          sudo docker-compose down --remove-orphans 2>/dev/null || true
          sudo docker system prune -f
          echo "Deteniendo servicios del sistema en puerto 80..."
          sudo systemctl stop nginx 2>/dev/null || true
          sudo systemctl stop apache2 2>/dev/null || true
          sudo lsof -ti:80 | xargs -r sudo kill -9 2>/dev/null || true
          echo "Deteniendo contenedores que usan el puerto 80..."
          sudo docker ps -q --filter "publish=80" | xargs -r sudo docker stop
          echo "Deteniendo contenedores que usan el puerto 8000..."
          sudo docker ps -q --filter "publish=8000" | xargs -r sudo docker stop
          echo "Levantando servicios con docker-compose..."
          sudo docker-compose up -d --build
          sleep 30
          echo "Verificando salud del backend..."
          curl -f http://localhost:8000/api/v1/health || exit 1
          echo "Verificando salud del frontend..."
          curl -f http://localhost/ || echo "Frontend check failed, but continuing deployment"
          echo "Estado de los contenedores:"
          sudo docker ps
          echo "Logs del frontend:"
          sudo docker logs syncar_frontend_1 --tail 20
          echo "Logs de nginx:"
          sudo docker logs syncar_nginx_1 --tail 10
          echo "✅ Despliegue exitoso!"
