name: Deploy SYNCAR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Clean Server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          echo "🧹 Configurando servidor limpio..."
          
          # Verificar si Docker ya está instalado
          if ! command -v docker &> /dev/null; then
            echo "🚀 Instalando dependencias del servidor..."
            
            # Actualizar sistema
            apt-get update
            apt-get upgrade -y
            
            # Instalar dependencias básicas
            apt-get install -y curl wget git unzip software-properties-common apt-transport-https ca-certificates gnupg lsb-release ufw
            
            # Instalar Docker
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
            apt-get update
            apt-get install -y docker-ce docker-ce-cli containerd.io
            
            # Instalar Docker Compose
            curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            chmod +x /usr/local/bin/docker-compose
            
            # Iniciar Docker
            systemctl start docker
            systemctl enable docker
            
            # Instalar Certbot
            apt-get install -y certbot
            
            # Configurar firewall
            ufw --force reset
            ufw default deny incoming
            ufw default allow outgoing
            ufw allow ssh
            ufw allow 80/tcp
            ufw allow 443/tcp
            ufw --force enable
            
            echo "✅ Servidor configurado"
          else
            echo "✅ Docker ya está instalado"
          fi

    - name: Deploy Application
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          echo "🚀 Desplegando aplicación..."
          
          DEPLOY_PATH=/www/wwwroot/syncar.cl
          REPO_URL=https://github.com/${{ github.repository }}

          mkdir -p $DEPLOY_PATH
          cd $DEPLOY_PATH

          if [ ! -d ".git" ]; then
            echo "🆕 Clonando repositorio..."
            git clone $REPO_URL .
          else
            echo "🔄 Actualizando repositorio..."
            git fetch origin
            git reset --hard origin/main
          fi

          echo "📝 Creando archivo .env..."
          cat > .env << ENVEOF
          COMPOSE_PROJECT_NAME=syncar
          POSTGRES_DB=syncar_db
          POSTGRES_USER=syncar_admin
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DATABASE_URL=postgresql://syncar_admin:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/syncar_db
          REDIS_URL=redis://redis:6379/0
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          FRONTEND_URL=https://syncar.cl
          NODE_ENV=production
          ENV=production
          NEXT_PUBLIC_APP_VERSION=v1.0.${{ github.run_number }}
          NEXT_PUBLIC_API_URL=/api/v1
          ENVEOF
          
          echo "🐳 Levantando servicios con Docker Compose..."
          export COMPOSE_HTTP_TIMEOUT=300
          docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
          
          echo "⏳ Esperando a que los servicios se inicien..."
          sleep 120
          
          echo "✅ Aplicación desplegada"

    - name: Setup SSL Certificate
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          echo "🔒 Configurando certificado SSL..."
          
          # Verificar si ya existe certificado
          if [ ! -f "/etc/letsencrypt/live/syncar.cl/fullchain.pem" ]; then
            echo "🆕 Obteniendo certificado SSL..."
            
            # Parar nginx temporalmente para certbot
            cd /www/wwwroot/syncar.cl
            docker-compose stop nginx
            
            # Obtener certificado
            certbot certonly --standalone \
              --non-interactive \
              --agree-tos \
              --email admin@syncar.cl \
              -d syncar.cl \
              -d www.syncar.cl
            
            # Reiniciar nginx
            docker-compose up -d nginx
            
            echo "✅ Certificado SSL configurado"
          else
            echo "✅ Certificado SSL ya existe"
          fi

    - name: Pre-deploy Validations
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          echo "🔍 Validando archivos clave y migraciones Alembic..."
          cd /www/wwwroot/syncar.cl
          # Comparar archivos locales vs producción
          diff .env .env.example || echo "⚠️ Diferencias en .env"
          diff docker-compose.yml docker-compose.yml.example || echo "⚠️ Diferencias en docker-compose.yml"
          diff nginx/nginx.conf nginx/nginx.conf.example || echo "⚠️ Diferencias en nginx.conf"
          # Verificar migraciones Alembic
          cd backend
          docker-compose exec backend alembic current || exit 1
          cd ..
          echo "✔️ Validaciones previas completadas"

    - name: Post-deploy Health Checks
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          echo "🔍 Verificando endpoints y servicios..."
          cd /www/wwwroot/syncar.cl
          curl -f http://localhost:8000/api/v1/health || (echo "❌ Backend roto, restaurando..." && docker-compose down && exit 1)
          curl -f http://localhost/ || (echo "❌ Frontend roto, restaurando..." && docker-compose down && exit 1)
          curl -f https://syncar.cl/ || (echo "❌ HTTPS roto, restaurando..." && docker-compose down && exit 1)
          echo "✅ Todo OK tras el deploy"

    - name: Final Health Check
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -e
          echo "🔍 Verificación final..."
          
          cd /www/wwwroot/syncar.cl
          
          # Verificar contenedores
          echo "📋 Estado de contenedores:"
          docker ps
          
          # Verificar backend
          echo "🔧 Verificando backend..."
          curl -f http://localhost:8000/api/v1/health || exit 1
          
          # Verificar frontend
          echo "🌐 Verificando frontend..."
          curl -f http://localhost/ || echo "⚠️ Frontend check failed"
          
          # Verificar HTTPS
          echo "🔒 Verificando HTTPS..."
          curl -f https://syncar.cl/ || echo "⚠️ HTTPS check failed"
          
          echo "✅ Despliegue completado exitosamente!"
